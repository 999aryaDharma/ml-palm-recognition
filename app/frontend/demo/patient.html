<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Check-in — PalmID</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
  </head>

  <body class="app-body">
    <!-- Navbar -->
    <header class="app-navbar" role="banner"></header>

    <!-- Main -->
    <main class="app-main">
      <div class="container-lg">
        <div class="page-header">
          <p class="eyebrow">DEMO MODULE</p>
          <h1>Patient Check-in</h1>
          <p>
            Demo identifikasi pasien rumah sakit untuk mempercepat proses
            pendaftaran dan administrasi.
          </p>
        </div>

        <div class="demo-grid">
          <!-- Patient Card Panel -->
          <section
            id="patient-panel"
            class="surface-card flex flex-col"
            style="min-height: 400px;"
          >
             <div id="patient-empty" class="flex flex-col items-center justify-center flex-1 text-center p-8">
                <div style="font-size: 3rem; opacity: 0.2; margin-bottom: var(--space-4);">🏥</div>
                <p class="text-muted">Pindai telapak tangan pasien untuk melihat data rekam medis.</p>
             </div>
             <div id="patient-data" class="hidden w-full h-full flex flex-col gap-6">
                <!-- Patient Info will be injected here -->
             </div>
          </section>

          <!-- Scanner Panel -->
          <section id="scanner-panel" class="flex flex-col gap-6">
            <div class="scanner" id="scanner-container">
              <video id="scanner-video" autoplay muted playsinline></video>
              
              <div class="scanner__target">
                <svg viewBox="0 0 220 220" fill="none">
                  <path d="M40 2H22C10.9543 2 2 10.9543 2 22V40" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                  <path d="M180 2H198C209.046 2 218 10.9543 218 22V40" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                  <path d="M40 218H22C10.9543 218 2 209.046 2 198V180" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                  <path d="M180 218H198C209.046 218 218 209.046 218 198V180" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                </svg>
              </div>
              
              <div class="scanner__scanline"></div>
              <div class="scanner__hint" id="scanner-hint">Arahkan telapak pasien...</div>
              
              <div class="scanner__processing">
                <div class="spinner"></div>
                <div class="scanner__processing-label" id="scanner-loading-label">Mencari Data Pasien...</div>
              </div>

              <div class="scanner__result" id="scanner-result"></div>

              <div class="scanner__placeholder" id="scanner-placeholder">
                <span style="font-size: 3rem; opacity: 0.5">🏥</span>
                <p>Scanner standby...</p>
              </div>
            </div>

            <div class="surface-card">
               <button class="btn btn--primary btn--full btn--lg" id="btn-start-scan">
                 Aktifkan Scanner Pasien
               </button>
            </div>
          </section>
        </div>
      </div>
    </main>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script type="module" src="../js/pages/patient.js"></script>
  </body>
</html>
