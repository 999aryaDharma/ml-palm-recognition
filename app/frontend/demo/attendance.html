<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absensi — PalmID</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
  </head>

  <body class="app-body">
    <!-- Navbar -->
    <header class="app-navbar" role="banner"></header>

    <!-- Main -->
    <main class="app-main">
      <div class="container-lg">
        <div class="page-header">
          <p class="eyebrow">DEMO MODULE</p>
          <h1>Sistem Absensi</h1>
          <p>
            Demo pencatatan kehadiran (check-in/out) karyawan menggunakan
            biometrik telapak tangan.
          </p>
        </div>

        <div class="demo-grid">
          <!-- History Panel -->
          <section class="surface-card flex flex-col" style="height: 100%">
            <div
              class="flex justify-between items-center"
              style="margin-bottom: var(--space-6)"
            >
              <h3 style="margin-bottom: 0">Log Kehadiran</h3>
              <div class="badge badge--online">Hari Ini</div>
            </div>

            <div
              id="attendance-list"
              class="flex flex-col gap-3"
              style="flex: 1"
            >
              <div class="empty-state" style="padding: var(--space-8) 0">
                <p class="text-xs">Belum ada aktivitas absensi hari ini.</p>
              </div>
            </div>
          </section>

          <!-- Scanner Panel -->
          <section id="scanner-panel" class="flex flex-col gap-6">
            <div class="scanner" id="scanner-container">
              <video id="scanner-video" autoplay muted playsinline></video>
              
              <div class="scanner__target">
                <svg viewBox="0 0 220 220" fill="none">
                  <path d="M40 2H22C10.9543 2 2 10.9543 2 22V40" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                  <path d="M180 2H198C209.046 2 218 10.9543 218 22V40" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                  <path d="M40 218H22C10.9543 218 2 209.046 2 198V180" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                  <path d="M180 218H198C209.046 218 218 209.046 218 198V180" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                </svg>
              </div>
              
              <div class="scanner__scanline"></div>
              <div class="scanner__hint" id="scanner-hint">Pilih mode absensi</div>
              
              <div class="scanner__processing">
                <div class="spinner"></div>
                <div class="scanner__processing-label" id="scanner-loading-label">Mengidentifikasi...</div>
              </div>

              <div class="scanner__result" id="scanner-result"></div>

              <div class="scanner__placeholder" id="scanner-placeholder">
                <span style="font-size: 3rem; opacity: 0.5">📋</span>
                <p>Klik tombol absensi untuk memulai</p>
              </div>
            </div>

            <div class="surface-card">
               <h4 class="eyebrow" style="margin-bottom: var(--space-4)">KONTROL ABSENSI</h4>
               <div class="flex flex-col gap-4">
                  <div class="two-col">
                    <button class="btn btn--secondary btn--full" id="btn-mode-checkin">Check-in</button>
                    <button class="btn btn--ghost btn--full" id="btn-mode-checkout">Check-out</button>
                  </div>
                  <div class="status-row">
                    <span class="status-row-label">Mode Saat Ini:</span>
                    <span class="status-row-value" id="current-mode-label">Check-in</span>
                  </div>
                  <button class="btn btn--primary btn--full btn--lg" id="btn-start-scan">
                    Mulai Scan Telapak
                  </button>
               </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script type="module" src="../js/pages/attendance.js"></script>
  </body>
</html>
